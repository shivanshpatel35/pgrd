task:
  shape_meta:
    # acceptable types: rgb, low_dim
    obs:
      agentview_image:
        shape: [3, 84, 84]
        type: rgb
      robot0_eye_in_hand_image:
        shape: [3, 84, 84]
        type: rgb
      robot0_eef_pos:
        shape: [3]
        # type default: low_dim
      robot0_eef_quat:
        shape: [4]
      robot0_gripper_qpos:
        shape: [2]
    action: 
      shape: [10]

  task_name: lift
  dataset_type: ph
  dataset_path: experiments/log/data/policy/${policy.task.task_name}/${policy.task.dataset_type}/image_abs.hdf5
  abs_action: True

  dataset:
    _target_: diffusion_policy.dataset.robomimic_replay_image_dataset.RobomimicReplayImageDataset
    shape_meta: ${policy.task.shape_meta}
    dataset_path: ${policy.task.dataset_path}
    horizon: ${policy.horizon}
    pad_before: ${eval:'${policy.n_obs_steps}-1+${policy.n_latency_steps}'}
    pad_after: ${eval:'${policy.n_action_steps}-1'}
    n_obs_steps: ${policy.dataset_obs_steps}
    abs_action: ${policy.task.abs_action}
    rotation_rep: 'rotation_6d'
    use_legacy_normalizer: False
    use_cache: True
    seed: 42
    val_ratio: 0.02

horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${policy.n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

model:
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy

  shape_meta: ${policy.task.shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small # Yilun's paper uses fixed_small_log instead, but easy to cause Nan
    clip_sample: True # required when predict_epsilon=False
    prediction_type: epsilon # or sample

  horizon: ${policy.horizon}
  n_action_steps: ${eval:'${policy.n_action_steps}+${policy.n_latency_steps}'}
  n_obs_steps: ${policy.n_obs_steps}
  num_inference_steps: 100
  obs_as_global_cond: ${policy.obs_as_global_cond}
  crop_shape: [76, 76]
  # crop_shape: null
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True
  obs_encoder_group_norm: True
  eval_fixed_crop: True

training:
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True

