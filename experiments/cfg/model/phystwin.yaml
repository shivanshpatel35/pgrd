defaults:
  - _self_

dynamics_type: 'phystwin'
device: "cuda:0"

clip_bound: 1.5
eef_t: [0.0, 0.0, 0.0]
gripper_radius: 0.04

# use CUDA graph to accelerate the simulation
use_graph: True

# time integration
FPS: 10
dt: 5e-5
num_substeps: 667  # round(1.0 / FPS / dt)

# dynamics
dashpot_damping: 100
drag_damping: 3
init_spring_Y: 3e4
spring_Y_min: 0
spring_Y_max: 1e5

# topology
object_radius: 0.02
object_max_neighbours: 30
controller_radius: 0.04
controller_max_neighbours: 50

# collision
collide_elas: 0.5
collide_fric: 0.3
collide_object_elas: 0.7
collide_object_fric: 0.3
collision_requires_grad: True
self_collision: False
collision_dist: 0.005
reverse_z: False  # false: positive z is up, true: negative z is up

# registration
icp_threshold: 0.02

# interpolation
use_lbs: False
precompute_relations: True  # only when use_lbs is True

# visualization
visualize_mesh_points: False
visualize_physics_points: False
visualize_robot_points: False

visualize_axis: False
axis_trans: [0.0, 0.0, 0.0]

# robot
use_control_points: False

# table height
table_height: 0.0